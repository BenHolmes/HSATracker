# Rate-limiting zones — basic DoS protection for a self-hosted deployment.
# 1 MB of shared memory holds ~16,000 IP states per zone.
# api:    30 req/s per IP — covers all API calls; burst allows short spikes
# upload: 3 req/s per IP — tighter limit for the file upload endpoint
limit_req_zone $binary_remote_addr zone=api:1m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload:1m rate=3r/s;

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to 15 MB (receipts max 10 MB + headroom)
    client_max_body_size 15M;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        image/svg+xml;

    # ── API proxy → backend service ────────────────────────────────────
    # Receipt upload — stricter rate limit applied before the general /api/ block
    location ~ ^/api/v1/expenses/[^/]+/receipts/$ {
        limit_req zone=upload burst=10 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Static assets — long-lived cache ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        try_files          $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
